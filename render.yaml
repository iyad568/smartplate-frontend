## SmartPlate DZ — Render Blueprint
## Defines both the React frontend and the FastAPI backend in one file.
## Docs: https://render.com/docs/blueprint-spec

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  - type: web
    name: smartplate-api
    runtime: python
    rootDir: smartplate_dz-master
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production

      # Render injects the connection string automatically from the linked DB
      - key: DATABASE_URL
        fromDatabase:
          name: smartplate-db
          property: connectionString

      # Render generates a secure random value on first deploy
      - key: SECRET_KEY
        generateValue: true

      # Set these manually in the Render dashboard after first deploy:
      #   BACKEND_URL  = https://smartplate-api.onrender.com
      #   FRONTEND_URL = https://smartplate-frontend.onrender.com
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

      # Email / SMTP — fill in the Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAILS_FROM_EMAIL
        sync: false
      - key: EMAILS_FROM_NAME
        value: SmartPlate DZ

  # ── React / Vite frontend (static site) ─────────────────────────────────────
  - type: web
    name: smartplate-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      # Send all routes to index.html so React Router handles them client-side
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Point the frontend at the backend — set this in the Render dashboard
      # once you know the backend URL, e.g. https://smartplate-api.onrender.com/api
      - key: VITE_API_URL
        sync: false

# ── PostgreSQL database ────────────────────────────────────────────────────────
databases:
  - name: smartplate-db
    plan: free
    databaseName: smartplate
    user: smartplate
